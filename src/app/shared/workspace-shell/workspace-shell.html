<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 4.5A2.5 2.5 0 0 1 7.5 2H17a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7.5A2.5 2.5 0 0 1 5 19.5v-15Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M9 7h6M9 11h6M9 15h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-name">DevNote</span>
      </div>

      <nav class="nav">
        <a class="nav-item" routerLink="/projects" routerLinkActive="nav-item--active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/>
          </svg>
          Projeler
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <button class="nav-item" (click)="toggleTheme()">
        @if (themeService.theme() === 'dark') {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.7"/>
            <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          Açık tema
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
          Koyu tema
        }
      </button>

      <button class="nav-item" (click)="signOut()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Çıkış
      </button>
    </div>
  </aside>

  <main class="content">
    <div class="content-inner">
      <ng-content />
    </div>
  </main>
</div>
